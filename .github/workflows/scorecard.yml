name: OpenSSF Scorecard

# Runs the OpenSSF Scorecard security health analysis weekly and on every
# push to main. Results are uploaded to GitHub's code-scanning dashboard
# AND published to https://securityscorecards.dev/ so the README badge has
# fresh data.
#
# Reference: https://github.com/ossf/scorecard-action

on:
  branch_protection_rule:
  schedule:
    # Mondays at 04:17 UTC. Stagger from common refresh times to avoid
    # being one of thousands queued at the top of the hour.
    - cron: "17 4 * * 1"
  push:
    branches: ["main"]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload results to the GitHub code-scanning dashboard.
      security-events: write
      # Needed to publish results to the public Scorecard API (badge data).
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          # publish_results: true is what makes the
          # https://api.securityscorecards.dev badge update.
          publish_results: true

      - name: Upload artifact (raw SARIF)
        uses: actions/upload-artifact@v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning dashboard
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
